server {
  listen 80;
  server_name _;

  # Serve the static viewer app
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ =404;
  }

  # Proxy terrain tile requests to the terrain-server container.
  # Using a variable defers DNS resolution to request time so nginx starts
  # cleanly even when terrain-server is not running.
  # TERRAIN_URL should be set to https://trailforkd.samwarr.dev/terrain
  location /terrain/ {
    resolver 127.0.0.11 valid=30s;
    set $upstream http://terrain-server:8080;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
  }
}
