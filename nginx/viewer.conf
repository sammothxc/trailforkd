server {
  listen 80;
  server_name _;

  # Serve the static viewer app
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ =404;
  }

  # Proxy terrain tile requests to the terrain-server container
  # TERRAIN_URL should be set to https://trailforkd.samwarr.dev/terrain
  location /terrain/ {
    proxy_pass http://terrain-server/;
    proxy_set_header Host $host;
  }
}
