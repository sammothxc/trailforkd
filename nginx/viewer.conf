server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ =404;
  }

  # .terrain tiles are gzip-compressed by ctb-tile.
  # Add Content-Encoding so the browser decompresses them.
  location ~* ^/terrain/.*\.terrain$ {
    resolver 127.0.0.11 valid=30s;
    set $upstream terrain-server:8080;
    rewrite ^/terrain(/.*) $1 break;
    proxy_pass http://$upstream;
    add_header Content-Encoding gzip always;
    add_header Content-Type "application/vnd.quantized-mesh;extensions=vertexnormals" always;
    gzip off;
  }

  location /terrain/ {
    resolver 127.0.0.11 valid=30s;
    set $upstream terrain-server:8080;
    rewrite ^/terrain(/.*) $1 break;
    proxy_pass http://$upstream;
  }
}
