server {
  listen 80;
  server_name _;

  add_header Access-Control-Allow-Origin "*";
  add_header Access-Control-Allow-Methods "GET, OPTIONS";
  add_header Access-Control-Allow-Headers "*";

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ =404;
  }

  # Allow preflight requests
  location / { if ($request_method = OPTIONS) { add_header Access-Control-Allow-Origin "*"; add_header Access-Control-Allow-Methods "GET, OPTIONS"; add_header Access-Control-Allow-Headers "*"; return 204; } }
}
