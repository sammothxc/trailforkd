<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrailForkd - Terrain Explorer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; font-family: monospace; }
    #cesiumContainer { width: 100%; height: 100%; }

    #toolbar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .tb-select, .tb-btn {
      background: rgba(13, 17, 23, 0.88);
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
    }
    .tb-select:focus, .tb-btn:focus { outline: none; }
    .tb-select:hover, .tb-btn:hover { border-color: #58a6ff; }
    .tb-btn.active { border-color: #3fb950; color: #3fb950; }

    #loadingOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-family: monospace;
      z-index: 200;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    #status {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(13, 17, 23, 0.8);
      color: #8b949e;
      font-size: 11px;
      font-family: monospace;
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="loadingOverlay">Loading terrain…</div>

  <div id="toolbar">
    <select id="terrainMenu" class="tb-select"></select>
    <select id="zoomMenu" class="tb-select"></select>
    <div id="toggleButtons" style="display:flex;gap:6px;"></div>
  </div>

  <div id="status">terrain: initializing</div>

  <!-- Copy cesium-config.example.js → cesium-config.js and add your Ion token (gitignored) -->
  <script src="cesium-config.js" onerror="console.warn('cesium-config.js not found — Ion features disabled')"></script>
  <script src="caesium-example.js"></script>
</body>
</html>
