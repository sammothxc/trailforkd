version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - HOST=0.0.0.0
      - PORT=5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    restart: unless-stopped

  terrain-server:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./data/terrain-tiles:/usr/share/nginx/html:ro
      - ./nginx/terrain.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
