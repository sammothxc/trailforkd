services:
  trailforkd:
    build: .
    image: sammothxc/trailforkd:latest
    ports:
      - "8080:80"
    environment:
      - CESIUM_ION_TOKEN=
      - TERRAIN_URL=
      - HEXAGON_URL=
    networks:
      - internal
    restart: unless-stopped

  terrain-server:
    image: nginx:alpine
    volumes:
      - ./data/terrain-tiles:/usr/share/nginx/html:ro
      - ./nginx/terrain.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
