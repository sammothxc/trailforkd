services:
  trailforkd:
    build: .
    image: trailforkd:latest
    ports:
      - "8080:80"
    environment:
      - CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN:-}
      - TERRAIN_URL=${TERRAIN_URL:-}
    restart: unless-stopped

  terrain-server:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./data/terrain-tiles:/usr/share/nginx/html:ro
      - ./nginx/terrain.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
