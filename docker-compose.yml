services:
  trailforkd:
    build: .
    image: sammothxc/trailforkd:latest
    ports:
      - "8080:80"
    environment:
      - CESIUM_ION_TOKEN=
      - TERRAIN_URL=
    networks:
      - internal
    restart: unless-stopped

  terrain-server:
    image: nginx:alpine
    volumes:
      - ./data/terrain-tiles:/usr/share/nginx/html:ro
    command: >
      sh -c "printf 'server {
        listen 80;
        location / {
          root /usr/share/nginx/html;
          add_header Access-Control-Allow-Origin *;
          try_files \$$uri \$$uri/ =404;
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
